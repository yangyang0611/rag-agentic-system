<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>RAG MCP Demo</title>
  <style>
    body { font-family: sans-serif; max-width: 800px; margin: 40px auto; padding: 0 20px; }
    h2 { margin-top: 40px; }
    input, textarea { width: 100%; padding: 8px; box-sizing: border-box; font-size: 14px; }
    button { margin-top: 8px; padding: 8px 20px; cursor: pointer; }
    #query-results, #ingest-result { margin-top: 16px; }
    .result-card {
      border: 1px solid #ddd;
      border-radius: 6px;
      padding: 12px;
      margin-bottom: 12px;
    }
    .result-meta { font-size: 12px; color: #888; margin-bottom: 6px; }
    .result-content { font-size: 14px; white-space: pre-wrap; }
    .error { color: red; }
  </style>
</head>
<body>
  <h1>RAG MCP Demo</h1>

  <h2>Ingest URL</h2>
  <input id="ingest-url" type="text" placeholder="https://en.wikipedia.org/wiki/..." />
  <button onclick="ingest()">Ingest</button>
  <div id="ingest-result"></div>

  <h2>Query</h2>
  <input id="query-input" type="text" placeholder="what is the purpose of RAG?" />
  <input id="n-results" type="number" value="3" min="1" max="20" style="width: 80px; margin-top: 6px;" />
  <label for="n-results" style="font-size: 14px;"> results</label>
  <button onclick="query()">Search</button>
  <button onclick="answer()">Ask GPT</button>
  <div id="query-results"></div>

  <script>
    const API = "http://localhost:8000";

    async function ingest() {
      const url = document.getElementById("ingest-url").value.trim();
      const el = document.getElementById("ingest-result");
      el.textContent = "Ingesting...";
      try {
        const res = await fetch(`${API}/ingest`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ url }),
        });
        const data = await res.json();
        el.textContent = `Done: ${data.chunks_stored} chunks stored from ${data.url}`;
      } catch (e) {
        el.innerHTML = `<span class="error">Error: ${e.message}</span>`;
      }
    }

    async function query() {
      const q = document.getElementById("query-input").value.trim();
      const nInput = document.getElementById("n-results");
      const raw = parseInt(nInput.value);
      const el = document.getElementById("query-results");
      if (isNaN(raw) || raw < 1 || raw > 20) {
        nInput.value = Math.min(Math.max(raw || 3, 1), 20);
        el.innerHTML = `<span class="error">Please enter a number between 1 and 20.</span>`;
        return;
      }
      const n = raw;
      el.textContent = "Searching...";
      try {
        const res = await fetch(`${API}/query`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ query: q, n_results: n }),
        });
        const results = await res.json();
        el.innerHTML = results.map((r, i) => `
          <div class="result-card">
            <div class="result-meta">(${i+1}) score: ${r.score} &nbsp;|&nbsp; chunk: ${r.chunk_index} &nbsp;|&nbsp; <a href="${r.url}" target="_blank">${r.url}</a></div>
            <div class="result-content">${r.content}</div>
          </div>
        `).join("");
      } catch (e) {
        el.innerHTML = `<span class="error">Error: ${e.message}</span>`;
      }
    }

    async function answer() {
      const q = document.getElementById("query-input").value.trim();
      const n = Math.min(Math.max(parseInt(document.getElementById("n-results").value) || 3, 1), 20);
      const el = document.getElementById("query-results");
      el.textContent = "Asking GPT...";
      try {
        const res = await fetch(`${API}/answer`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ query: q, n_results: n }),
        });
        const data = await res.json();
        el.innerHTML = `
          <div class="result-card" style="background:#f9f9f9;">
            <strong>GPT Answer</strong>
            <p>${data.answer}</p>
          </div>
          <details>
            <summary style="cursor:pointer; font-size:13px; color:#888;">Sources (${data.sources.length})</summary>
            ${data.sources.map((r, i) => `
              <div class="result-card">
                <div class="result-meta">(${i+1}) score: ${r.score} &nbsp;|&nbsp; <a href="${r.url}" target="_blank">${r.url}</a></div>
                <div class="result-content">${r.content}</div>
              </div>
            `).join("")}
          </details>`;
      } catch (e) {
        el.innerHTML = `<span class="error">Error: ${e.message}</span>`;
      }
    }
  </script>
</body>
</html>
